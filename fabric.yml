bundle:
  name: contoso-analytics
  version: "1.0.0"
  description: "Contoso Analytics — medallion lakehouse with CI/CD"

variables:
  capacity_id:
    description: "Fabric capacity GUID"
  source_connection:
    description: "Source database connection string"
    default: ""

resources:
  # ---------------------------------------------------------------------------
  # Spark Environment
  # ---------------------------------------------------------------------------
  environments:
    spark_env:
      runtime: "1.3"
      libraries:
        - semantic-link-labs
        - delta-spark
        - great-expectations

  # ---------------------------------------------------------------------------
  # Lakehouses
  # ---------------------------------------------------------------------------
  lakehouses:
    bronze:
      description: "Raw data landing zone — append-only from source systems"
      enable_schemas: true

    silver:
      description: "Cleaned, validated, deduplicated data"
      enable_schemas: true

    gold:
      description: "Business-ready aggregates for reporting"
      enable_schemas: true

  # ---------------------------------------------------------------------------
  # ETL Notebooks
  # ---------------------------------------------------------------------------
  notebooks:
    ingest_to_bronze:
      path: ./notebooks/ingest_to_bronze.py
      description: "Ingest raw data from sources into bronze lakehouse"
      environment: spark_env
      default_lakehouse: bronze
      parameters:
        source_path: "/mnt/raw"

    bronze_to_silver:
      path: ./notebooks/bronze_to_silver.py
      description: "Clean, validate, deduplicate bronze data"
      environment: spark_env
      default_lakehouse: silver

    silver_to_gold:
      path: ./notebooks/silver_to_gold.py
      description: "Aggregate silver data into gold datasets"
      environment: spark_env
      default_lakehouse: gold

    data_quality_checks:
      path: ./notebooks/data_quality_checks.py
      description: "Run data quality validations on all layers"
      environment: spark_env
      default_lakehouse: gold

  # ---------------------------------------------------------------------------
  # Pipelines
  # ---------------------------------------------------------------------------
  pipelines:
    daily_etl:
      description: "Daily ETL: ingest → clean → aggregate"
      schedule:
        cron: "0 6 * * *"
        timezone: America/Chicago
        enabled: true
      activities:
        - name: ingest
          notebook: ingest_to_bronze
        - name: clean
          notebook: bronze_to_silver
          depends_on: [ingest]
        - name: aggregate
          notebook: silver_to_gold
          depends_on: [clean]

    data_quality:
      description: "Data quality pipeline — runs after ETL"
      activities:
        - name: validate
          notebook: data_quality_checks

  # ---------------------------------------------------------------------------
  # Warehouse
  # ---------------------------------------------------------------------------
  warehouses:
    analytics_warehouse:
      description: "SQL views over gold lakehouse"
      sql_scripts:
        - ./sql/create_views.sql

  # ---------------------------------------------------------------------------
  # Data Agent
  # ---------------------------------------------------------------------------
  data_agents:
    analytics_agent:
      description: "Natural language analytics over gold data"
      sources:
        - gold
        - analytics_warehouse
      instructions: ./agent/instructions.md
      few_shot_examples: ./agent/examples.yaml

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
security:
  roles:
    - name: data_engineers
      entra_group: "${var.eng_group_id}"
      workspace_role: contributor
    - name: analysts
      entra_group: "${var.analyst_group_id}"
      workspace_role: viewer
      onelake_roles:
        - tables: ["*"]
          permissions: [read]

# ---------------------------------------------------------------------------
# Policies
# ---------------------------------------------------------------------------
policies:
  require_description: true
  naming_convention: snake_case
  max_notebook_size_kb: 500

# ---------------------------------------------------------------------------
# Targets
# ---------------------------------------------------------------------------
targets:
  dev:
    default: true
    workspace:
      name: contoso-analytics-dev
      capacity_id: "${var.capacity_id}"
    variables:
      source_connection: "${secret.DEV_SOURCE_CONNECTION}"
      eng_group_id: "00000000-0000-0000-0000-000000000000"
      analyst_group_id: "00000000-0000-0000-0000-000000000000"

  test:
    workspace:
      name: contoso-analytics-test
      capacity_id: "${var.capacity_id}"
    variables:
      source_connection: "${secret.TEST_SOURCE_CONNECTION}"
      eng_group_id: "00000000-0000-0000-0000-000000000000"
      analyst_group_id: "00000000-0000-0000-0000-000000000000"
    post_deploy:
      - run: data_quality_checks
        expect: success
        timeout: 600

  prod:
    workspace:
      name: contoso-analytics-prod
      capacity_id: "${var.capacity_id}"
    run_as:
      service_principal: sp-fabric-prod
    variables:
      source_connection: "${secret.PROD_SOURCE_CONNECTION}"
      eng_group_id: "00000000-0000-0000-0000-000000000000"
      analyst_group_id: "00000000-0000-0000-0000-000000000000"
