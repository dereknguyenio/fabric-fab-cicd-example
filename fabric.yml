bundle:
  name: contoso-analytics
  version: "1.0.0"
  description: "Contoso Analytics — medallion lakehouse with CI/CD"

resources:
  # ---------------------------------------------------------------------------
  # Spark Environment
  # ---------------------------------------------------------------------------
  environments:
    spark_env:
      runtime: "1.3"
      libraries:
        - semantic-link-labs
        - delta-spark

  # ---------------------------------------------------------------------------
  # Lakehouses
  # ---------------------------------------------------------------------------
  lakehouses:
    bronze:
      description: "Raw data landing zone — append-only from source systems"
      enable_schemas: true

    silver:
      description: "Cleaned, validated, deduplicated data"
      enable_schemas: true

    gold:
      description: "Business-ready aggregates for reporting"
      enable_schemas: true

  # ---------------------------------------------------------------------------
  # ETL Notebooks
  # ---------------------------------------------------------------------------
  notebooks:
    ingest_to_bronze:
      path: ./notebooks/ingest_to_bronze.py
      description: "Ingest raw data from sources into bronze lakehouse"
      environment: spark_env
      default_lakehouse: bronze

    bronze_to_silver:
      path: ./notebooks/bronze_to_silver.py
      description: "Clean, validate, deduplicate bronze data"
      environment: spark_env
      default_lakehouse: silver

    silver_to_gold:
      path: ./notebooks/silver_to_gold.py
      description: "Aggregate silver data into gold datasets"
      environment: spark_env
      default_lakehouse: gold

    data_quality_checks:
      path: ./notebooks/data_quality_checks.py
      description: "Run data quality validations on all layers"
      environment: spark_env
      default_lakehouse: gold

  # ---------------------------------------------------------------------------
  # Pipelines
  # ---------------------------------------------------------------------------
  pipelines:
    daily_etl:
      description: "Daily ETL: ingest → clean → aggregate"
      activities:
        - name: ingest
          notebook: ingest_to_bronze
        - name: clean
          notebook: bronze_to_silver
          depends_on: [ingest]
        - name: aggregate
          notebook: silver_to_gold
          depends_on: [clean]

    data_quality:
      description: "Data quality pipeline — runs after ETL"
      activities:
        - name: validate
          notebook: data_quality_checks

  # ---------------------------------------------------------------------------
  # Warehouse
  # ---------------------------------------------------------------------------
  warehouses:
    analytics_warehouse:
      description: "SQL views over gold lakehouse"

  # ---------------------------------------------------------------------------
  # Data Agent
  # ---------------------------------------------------------------------------
  data_agents:
    analytics_agent:
      description: "Natural language analytics over gold data"
      sources:
        - gold
        - analytics_warehouse
      instructions: ./agent/instructions.md

# ---------------------------------------------------------------------------
# Security — grant workspace access so users aren't locked out
# ---------------------------------------------------------------------------
# When the service principal creates workspaces in CI/CD, no humans have access.
# Add your Entra user/group GUIDs here. Set ADMIN_USER_ID as a GitHub variable.
security:
  roles:
    - name: workspace_admins
      entra_user: "${env.ADMIN_USER_ID}"
      workspace_role: admin

# ---------------------------------------------------------------------------
# Targets
# ---------------------------------------------------------------------------
# Configure these via GitHub Actions:
#   Secrets: AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
#   Variables: FAB_CAPACITY_ID
#
# The capacity_id reads from the FAB_CAPACITY_ID environment variable.
# Workspace names can be customized by forking and editing below.
targets:
  dev:
    default: true
    workspace:
      name: contoso-analytics-dev
      capacity_id: "${env.FAB_CAPACITY_ID}"

  test:
    workspace:
      name: contoso-analytics-test
      capacity_id: "${env.FAB_CAPACITY_ID}"

  prod:
    workspace:
      name: contoso-analytics-prod
      capacity_id: "${env.FAB_CAPACITY_ID}"
